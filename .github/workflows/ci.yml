# ci.yml — GitHub Actions CI/CD pipeline for llama.cpp + KleidiAI.
#
# Triggers on push and pull requests to main branch.
# Runs on ARM64 GitHub-hosted runners (ubuntu-24.04-arm).
#
# Pipeline:
#   1. Lint — shellcheck, formatting checks
#   2. Build — full setup.sh run on ARM64
#   3. Verify — verify.sh dependency and build checks
#   4. Probe — probe.py capability detection
#   5. Docker — build and verify Docker image

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs for the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: Lint and format checks
  # ────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Shellcheck setup.sh
        run: shellcheck -S warning setup.sh

      - name: Shellcheck verify.sh
        run: shellcheck -S warning verify.sh

      - name: Check Python syntax (probe.py)
        run: python3 -m py_compile probe.py

      - name: Check script permissions
        run: |
          for f in setup.sh verify.sh; do
            if [[ ! -x "$f" ]]; then
              echo "ERROR: $f is not executable"
              exit 1
            fi
          done

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: Full build on ARM64
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-24.04-arm
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run setup.sh
        run: ./setup.sh -j2 --skip-update

      - name: Verify build with verify.sh
        run: ./verify.sh

      - name: Run probe.py
        run: python3 probe.py

      - name: Run probe.py (JSON)
        run: python3 probe.py --json

  # ────────────────────────────────────────────────────────────────────────────
  # Job 3: Docker build
  # ────────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-24.04-arm
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            --build-arg BUILD_JOBS=2 \
            --tag llama-kleidai:ci \
            .

      - name: Verify Docker image
        run: |
          # Check the entrypoint binary exists
          docker run --rm llama-kleidai:ci --help | head -5 || true
          echo "Docker image built and runs successfully"
